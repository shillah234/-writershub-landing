<script>
    // Get the referral code from the URL - IMPROVED VERSION
    function getReferralCode() {
        // Get the full URL path
        const fullUrl = window.location.href;
        console.log("Full URL:", fullUrl);
        
        // Try to get from pathname first
        const path = window.location.pathname;
        console.log("Path:", path);
        
        // Split by / and get the last non-empty part
        const parts = path.split('/').filter(part => part.length > 0);
        console.log("Parts:", parts);
        
        if (parts.length > 0) {
            const lastPart = parts[parts.length - 1];
            // Check if it's not index.html
            if (lastPart !== 'index.html') {
                return lastPart;
            }
        }
        
        // Check query parameters as fallback
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('code');
    }

    // Get and display the code
    const referralCode = getReferralCode() || 'No Code';
    console.log("Referral code found:", referralCode);
    
    // Display it on the page
    const codeElement = document.getElementById('referralCode');
    if (codeElement) {
        codeElement.textContent = referralCode;
    }
    
    // Save to localStorage
    if (referralCode && referralCode !== 'No Code') {
        localStorage.setItem('writershub_referral', referralCode);
    }
    
    // Handle the "Open App" link
    document.getElementById('openApp').onclick = function(e) {
        e.preventDefault();
        if (referralCode && referralCode !== 'No Code') {
            // Try custom scheme first
            window.location = 'writershub://refer/' + referralCode;
            
            // Fallback to intent
            setTimeout(function() {
                window.location = 'intent://refer/' + referralCode + 
                    '#Intent;scheme=https;package=com.writershub.app;end';
            }, 500);
        } else {
            alert('No referral code found');
        }
    };
</script>
